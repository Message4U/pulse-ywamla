<!DOCTYPE html>
<html>
<head>
  <title>PULSE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.png">
  <meta name="theme-color" content="#16213e">

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    body { margin:0; font-family:Arial,sans-serif; background:#f7f7f5; color:#16213e; }
    .app { max-width:430px; margin:auto; padding:18px 18px 100px; }
    h1 { text-align:center; margin:18px 0 4px; font-size:34px; letter-spacing:1px; }
    .subtitle { text-align:center; color:#777; font-size:13px; margin-bottom:18px; }
    .section-title { font-weight:bold; margin:20px 0 10px; font-size:15px; text-transform:uppercase; }
    .card { background:white; border-radius:14px; padding:14px; margin-bottom:10px; box-shadow:0 2px 8px rgba(0,0,0,.07); cursor:pointer; }
    .small { color:#666; font-size:13px; margin-top:4px; }
    .back { margin-bottom:16px; display:inline-block; color:#f97316; font-weight:bold; cursor:pointer; }
    .nav { position:fixed; bottom:0; left:0; right:0; background:white; border-top:1px solid #ddd; display:flex; justify-content:space-around; padding:12px 0; font-size:13px; z-index:10; }
    .nav div { cursor:pointer; }
    .triangle-wrap { position:relative; width:100%; max-width:340px; margin:0 auto 22px; }
    .triangle { width:100%; display:block; border-radius:20px; }
    .tap-zone { position:absolute; display:block; cursor:pointer; }
    .campus-zone { right:0; bottom:18%; width:55%; height:28%; }
    .go-zone { left:0; bottom:8%; width:45%; height:55%; }
    .uofn-zone { top:0; right:16%; width:45%; height:55%; }
    .chat-input { position:fixed; bottom:48px; left:0; right:0; max-width:430px; margin:auto; padding:10px; background:#f7f7f5; display:flex; gap:8px; z-index:9; }
    .chat-input input { flex:1; padding:10px; border-radius:10px; border:1px solid #ccc; }
    button { padding:10px 14px; border:none; background:#f97316; color:white; border-radius:10px; }
    input { padding:10px; border-radius:10px; border:1px solid #ccc; box-sizing:border-box; }
    .name-input { width:100%; margin-bottom:12px; }
    #messages { margin-bottom:90px; }
  </style>
</head>

<body>

<div class="app" id="app"></div>

<div class="nav">
  <div onclick="showHome()">Home</div>
  <div onclick="showChatList()">Chat</div>
  <div onclick="showPage('Calendar','Weekly calendar coming')">Calendar</div>
  <div onclick="showPage('Docs','Docs coming')">Docs</div>
</div>

<script>
  const SUPABASE_URL = "https://livkeknqrjgmumjgwkuh.supabase.co";
  const SUPABASE_KEY = "sb_publishable_uGTC509N0reeUKs-5SviUQ_2VJvhEa1";
  const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let currentConversationId = null;
  let currentConversationName = "";

  function getMyName() {
    let name = localStorage.getItem("pulse_name");
    while (!name || name.trim() === "") {
      name = prompt("Enter your name:");
      if (name) localStorage.setItem("pulse_name", name.trim());
    }
    return name.trim();
  }

  function saveName() {
    const input = document.getElementById("nameInput");
    if (input.value.trim()) localStorage.setItem("pulse_name", input.value.trim());
  }

  function showHome() {
    document.getElementById("app").innerHTML = `
      <h1>PULSE</h1>
      <div class="subtitle">YWAM Los Angeles</div>

      <div class="triangle-wrap">
        <img src="triangle.png" class="triangle" alt="YWAM LA Triangle">
        <div onclick="showArea('Campus','Life & Operations')" class="tap-zone campus-zone"></div>
        <div onclick="showArea('Go','Outreach & Missions')" class="tap-zone go-zone"></div>
        <div onclick="showArea('UofN','Training & Schools')" class="tap-zone uofn-zone"></div>
      </div>

      <div class="section-title">Announcements</div>
      <div class="card"><strong>Staff Meeting</strong><div class="small">Friday 10am</div></div>
      <div class="card"><strong>Outreach Team Update</strong><div class="small">Summer Mexico outreach is now full.</div></div>

      <div class="section-title">This Week</div>
      <div class="card"><strong>Intercession</strong><div class="small">Friday · 6:00 AM</div></div>
    `;
  }

  function showArea(title, subtitle) {
    document.getElementById("app").innerHTML = `
      <span class="back" onclick="showHome()">← Back</span>
      <h1>${title}</h1>
      <div class="subtitle">${subtitle}</div>
      <div class="card"><strong>Leaders</strong><div class="small">Add leaders and team members here.</div></div>
      <div class="card"><strong>Updates</strong><div class="small">Area-specific announcements will show here.</div></div>
      <div class="card" onclick="showChatList()"><strong>Open Chat</strong><div class="small">Go to conversation list.</div></div>
    `;
  }

  function showPage(title, text) {
    document.getElementById("app").innerHTML = `
      <span class="back" onclick="showHome()">← Back</span>
      <h1>${title}</h1>
      <div class="card">${text}</div>
    `;
  }

  async function showChatList() {
    const myName = getMyName();

    document.getElementById("app").innerHTML = `
      <h1>Chats</h1>
      <div class="subtitle">Conversations, groups, and private messages</div>

      <input id="nameInput" class="name-input" placeholder="Your name" value="${myName}" oninput="saveName()">

      <div class="section-title">Official & Group Chats</div>
      <div id="conversationList"><div class="card">Loading chats...</div></div>

      <div class="section-title">Start Private Chat</div>
      <div class="card">
        <input id="privateName" placeholder="Person's name" style="width:100%; margin-bottom:8px;">
        <button onclick="startPrivateChat()">Start Chat</button>
      </div>
    `;

    await loadConversationList();
  }

  async function loadConversationList() {
    const box = document.getElementById("conversationList");
    const myName = getMyName();

    const { data, error } = await db
      .from("conversations")
      .select("*")
      .order("created_at", { ascending: true });

    if (error) {
      box.innerHTML = `<div class="card">Error loading chats: ${error.message}</div>`;
      return;
    }

    const visible = data.filter(c => {
      if (c.type !== "dm") return true;
      return c.name.includes(myName);
    });

    box.innerHTML = visible.map(c => `
      <div class="card" onclick="openConversation('${c.id}', '${escapeText(c.name)}')">
        <strong>${c.name}</strong>
        <div class="small">${c.type === "dm" ? "Private conversation" : c.type}</div>
      </div>
    `).join("");
  }

  async function startPrivateChat() {
    const myName = getMyName();
    const otherInput = document.getElementById("privateName");
    const otherName = otherInput.value.trim();

    if (!otherName) {
      alert("Enter a name first.");
      return;
    }

    const names = [myName, otherName].sort();
    const dmName = `${names[0]} ↔ ${names[1]}`;

    const { data: existing } = await db
      .from("conversations")
      .select("*")
      .eq("name", dmName)
      .eq("type", "dm")
      .limit(1);

    if (existing && existing.length > 0) {
      openConversation(existing[0].id, existing[0].name);
      return;
    }

    const { data, error } = await db
      .from("conversations")
      .insert([{ name: dmName, type: "dm", created_by_name: myName }])
      .select()
      .single();

    if (error) {
      alert("Error creating private chat: " + error.message);
      return;
    }

    await db.from("conversation_members").insert([
      { conversation_id: data.id, member_name: myName },
      { conversation_id: data.id, member_name: otherName }
    ]);

    openConversation(data.id, data.name);
  }

  async function openConversation(id, name) {
    currentConversationId = id;
    currentConversationName = name;

    document.getElementById("app").innerHTML = `
      <span class="back" onclick="showChatList()">← Chats</span>
      <h1>${name}</h1>
      <div id="messages"><div class="card">Loading messages...</div></div>

      <div class="chat-input">
        <input id="messageInput" placeholder="Type message...">
        <button onclick="sendMessage()">Send</button>
      </div>
    `;

    await loadMessages();
  }

  async function loadMessages() {
    const box = document.getElementById("messages");
    if (!box || !currentConversationId) return;

    const { data, error } = await db
      .from("messages")
      .select("*")
      .eq("conversation_id", currentConversationId)
      .order("created_at", { ascending: true });

    if (error) {
      box.innerHTML = `<div class="card">Error: ${error.message}</div>`;
      return;
    }

    if (!data || data.length === 0) {
      box.innerHTML = `<div class="card">No messages yet.</div>`;
      return;
    }

    box.innerHTML = data.map(msg => `
      <div class="card">
        <strong>${msg.sender_name || "Anonymous"}</strong>
        <div class="small">${msg.content}</div>
      </div>
    `).join("");

    setTimeout(() => {
      window.scrollTo(0, document.body.scrollHeight);
    }, 50);
  }

  async function sendMessage() {
    const input = document.getElementById("messageInput");
    const text = input.value.trim();
    const myName = getMyName();

    if (!text || !currentConversationId) return;

    const { error } = await db.from("messages").insert([{
      content: text,
      sender_name: myName,
      conversation_id: currentConversationId
    }]);

    if (error) {
      alert("Error sending message: " + error.message);
      return;
    }

    input.value = "";
    await loadMessages();
  }

  function escapeText(text) {
    return String(text).replace(/'/g, "\\'");
  }

  db.channel("pulse-conversations")
    .on("postgres_changes", { event: "*", schema: "public", table: "messages" }, () => {
      loadMessages();
    })
    .on("postgres_changes", { event: "*", schema: "public", table: "conversations" }, () => {
      if (document.getElementById("conversationList")) loadConversationList();
    })
    .subscribe();

  showHome();
</script>

</body>
</html>
