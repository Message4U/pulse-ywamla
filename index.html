<!DOCTYPE html>
<html>
<head>
  <title>PULSE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.png">
  <meta name="theme-color" content="#16213e">

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="style.css">

  <style>
    .logo {
      display:block;
      width:300px;
      max-width:90%;
      margin:10px auto 4px;
    }
    .logo-subtitle {
      text-align:center;
      font-size:14px;
      color:#6b7280;
      font-weight:600;
      margin-bottom:10px;
    }
  </style>
</head>

<body>

<div class="app" id="app"></div>

<div class="nav" id="nav">
  <div onclick="showHome()">Home</div>
  <div onclick="showChatList()">Chat</div>
  <div onclick="showCalendar()">Calendar</div>
  <div onclick="showPage('Docs','Docs coming')">Docs</div>
</div>

<script>
  const SUPABASE_URL = "https://livkeknqrjgmumjgwkuh.supabase.co";
  const SUPABASE_KEY = "sb_publishable_uGTC509N0reeUKs-5SviUQ_2VJvhEa1";
  const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let currentUser = null;
  let currentProfile = null;

  async function init() {
    const { data } = await db.auth.getUser();
    currentUser = data.user;

    if (currentUser) {
      await loadProfile();
      showHome();
    } else {
      showLogin();
    }
  }

  function showHome() {
    if (!currentUser) return showLogin();

    document.getElementById("nav").style.display = "flex";

    document.getElementById("app").innerHTML = `
      <img src="/ywam_la_new_logo_horizontal.png" class="logo">
      <div class="logo-subtitle">Pulse Ecosystem</div>

      <div class="small" style="text-align:center;">
        Signed in as ${currentProfile?.name || currentUser.email}
        · <span onclick="logout()" style="color:#f97316; cursor:pointer;">Log out</span>
      </div>

      <div class="triangle-wrap">
        <img src="/triangle.png" class="triangle">
      </div>

      <div class="section-title">Pages</div>

      <div class="pages-grid">
        <div class="page-tile" onclick="showPage('Staff','Coming soon')">
          <div class="page-icon">👥</div>
          <div class="page-title">Staff</div>
        </div>

        <div class="page-tile" onclick="showPage('Bulletin','Coming soon')">
          <div class="page-icon">📌</div>
          <div class="page-title">Bulletin</div>
        </div>

        <div class="page-tile" onclick="showPage('Drives','Coming soon')">
          <div class="page-icon">📁</div>
          <div class="page-title">Drives</div>
        </div>

        <div class="page-tile" onclick="showPage('Lockup','Coming soon')">
          <div class="page-icon">🔒</div>
          <div class="page-title">Lockup</div>
        </div>

        <div class="page-tile" onclick="showPage('Worship','Coming soon')">
          <div class="page-icon">🎵</div>
          <div class="page-title">Worship</div>
        </div>

        <div class="page-tile" onclick="showPage('Prayer','Coming soon')">
          <div class="page-icon">🙏</div>
          <div class="page-title">Prayer</div>
        </div>
      </div>
    `;
  }

  function showPage(title, text) {
    document.getElementById("app").innerHTML = `
      <span onclick="showHome()">← Back</span>
      <h1>${title}</h1>
      <div class="card">${text}</div>
    `;
  }

  function showLogin() {
    document.getElementById("nav").style.display = "none";

    document.getElementById("app").innerHTML = `
      <h1>PULSE</h1>
      <div class="card">
        <input id="email" placeholder="Email">
        <input id="password" type="password" placeholder="Password">
        <button onclick="login()">Login</button>
      </div>
    `;
  }

  async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { data, error } = await db.auth.signInWithPassword({ email, password });

    if (error) {
      alert(error.message);
      return;
    }

    currentUser = data.user;
    await loadProfile();
    showHome();
  }

  async function logout() {
    await db.auth.signOut();
    currentUser = null;
    showLogin();
  }

  async function loadProfile() {
    const { data } = await db.from("profiles")
      .select("*")
      .eq("id", currentUser.id)
      .single();

    currentProfile = data;
  }

  init();
</script>

</body>
</html>
