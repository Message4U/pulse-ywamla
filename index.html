<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PULSE</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body { font-family: Arial; margin:0; background:#f4f4f4; }
    #app { padding:20px; padding-bottom:80px; }

    .card {
      background:white;
      padding:15px;
      margin:10px 0;
      border-radius:12px;
      box-shadow:0 2px 6px rgba(0,0,0,0.1);
    }

    .sender {
      font-weight:bold;
      cursor:pointer;
      color:#f97316;
    }

    .input { width:100%; padding:10px; margin:10px 0; }

    .row { display:flex; gap:10px; }

    .btn {
      padding:10px;
      background:#f97316;
      color:white;
      border:none;
      border-radius:8px;
    }

    .bottom {
      position:fixed;
      bottom:0;
      width:100%;
      display:flex;
      justify-content:space-around;
      background:white;
      padding:10px;
      border-top:1px solid #ccc;
    }
  </style>
</head>

<body>

<div id="app"></div>

<div class="bottom">
  <div onclick="showHome()">Home</div>
  <div onclick="showChats()">Chat</div>
  <div>Calendar</div>
  <div>Docs</div>
</div>

<script>
const SUPABASE_URL = "https://livkeknqrjgmumjgwkuh.supabase.co";
const SUPABASE_KEY = "sb_publishable_uGTC509N0reeUKs-5SviUQ_2VJvhEa1";

const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentConversationId = null;

function getMyName() {
  return document.getElementById("username")?.value || "Anonymous";
}

function showHome() {
  document.getElementById("app").innerHTML = `
    <h1>PULSE</h1>
    <input id="username" class="input" placeholder="Your name">
    <div class="card">Welcome</div>
  `;
}

async function showChats() {
  document.getElementById("app").innerHTML = `
    <h2>Chats</h2>
    <input id="username" class="input" placeholder="Your name">
    <div id="list"></div>
  `;
  loadConversationList();
}

async function loadConversationList() {
  const { data } = await db.from("conversations").select("*");

  const myName = getMyName();

  const visible = data.filter(c => {
    if (c.type !== "dm") return true;
    return c.name.toLowerCase().includes(myName.toLowerCase());
  });

  document.getElementById("list").innerHTML =
    visible.map(c => `
      <div class="card" onclick="openConversation('${c.id}','${c.name}')">
        ${c.name}
      </div>
    `).join("");
}

function openConversation(id, name) {
  currentConversationId = id;

  document.getElementById("app").innerHTML = `
    <div onclick="showChats()">← Chats</div>
    <h2>${name}</h2>

    <div id="messages"></div>

    <div class="row">
      <input id="msg" class="input">
      <button class="btn" onclick="sendMessage()">Send</button>
    </div>
  `;

  loadMessages();
}

async function loadMessages() {
  const { data } = await db
    .from("messages")
    .select("*")
    .eq("conversation_id", currentConversationId)
    .order("created_at");

  document.getElementById("messages").innerHTML =
    data.map(m => `
      <div class="card">
        <div class="sender" onclick="startPrivateChat('${m.sender_name}')">
          ${m.sender_name || "Anonymous"}
        </div>
        <div>${m.content}</div>
      </div>
    `).join("");
}

async function sendMessage() {
  const text = document.getElementById("msg").value;
  const name = getMyName();

  await db.from("messages").insert({
    content: text,
    sender_name: name,
    conversation_id: currentConversationId
  });

  document.getElementById("msg").value = "";
  loadMessages();
}

async function startPrivateChat(other) {
  const me = getMyName();

  if (!other || other === me) return;

  const names = [me, other].sort();
  const dm = names[0] + " ↔ " + names[1];

  const { data } = await db
    .from("conversations")
    .select("*")
    .eq("name", dm)
    .limit(1);

  if (data.length > 0) {
    openConversation(data[0].id, data[0].name);
    return;
  }

  const { data: newConv } = await db
    .from("conversations")
    .insert([{ name: dm, type: "dm" }])
    .select()
    .single();

  await db.from("conversation_members").insert([
    { conversation_id: newConv.id, member_name: me },
    { conversation_id: newConv.id, member_name: other }
  ]);

  openConversation(newConv.id, newConv.name);
}

// realtime
db.channel("live")
  .on("postgres_changes", { event: "*", schema: "public", table: "messages" }, loadMessages)
  .subscribe();

showHome();
</script>

</body>
</html>
