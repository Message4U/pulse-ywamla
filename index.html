<!DOCTYPE html>
<html>
<head>
  <title>PULSE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.png">
  <meta name="theme-color" content="#16213e">

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    body { margin:0; font-family:Arial,sans-serif; background:#ffffff; color:#16213e; }
    .app { max-width:430px; margin:auto; padding:10px 18px 100px; }
    h1 { text-align:center; margin:14px 0 4px; font-size:34px; letter-spacing:1px; }
    h2 { text-align:center; }
    .subtitle { text-align:center; color:#777; font-size:13px; margin-bottom:12px; }
    .section-title { font-weight:bold; margin:22px 0 10px; font-size:15px; text-transform:uppercase; color:#6b7280; letter-spacing:.5px; }
    .card { background:white; border-radius:14px; padding:14px; margin-bottom:10px; box-shadow:0 2px 8px rgba(0,0,0,.07); cursor:pointer; }
    .small { color:#666; font-size:13px; margin-top:4px; }
    .back { margin-bottom:16px; display:inline-block; color:#f97316; font-weight:bold; cursor:pointer; }
    input { width:100%; padding:12px; border-radius:10px; border:1px solid #ccc; box-sizing:border-box; margin-bottom:10px; }
    button { padding:11px 14px; border:none; background:#f97316; color:white; border-radius:10px; font-weight:bold; cursor:pointer; }
    .secondary { background:#16213e; }
    .link { color:#f97316; font-weight:bold; cursor:pointer; }
    .nav { position:fixed; bottom:0; left:0; right:0; background:white; border-top:1px solid #ddd; display:flex; justify-content:space-around; padding:12px 0; font-size:13px; z-index:10; }
    .nav div { cursor:pointer; color:#6b7280; font-weight:bold; text-align:center; }
    .triangle-wrap { position:relative; width:100%; max-width:420px; margin:0 auto 18px; }
    .triangle { width:100%; display:block; border-radius:20px; }
    .tap-zone { position:absolute; display:block; cursor:pointer; }
    .campus-zone { right:0; bottom:18%; width:55%; height:28%; }
    .go-zone { left:0; bottom:8%; width:45%; height:55%; }
    .uofn-zone { top:0; right:16%; width:45%; height:55%; }
    .chat-input { position:fixed; bottom:48px; left:0; right:0; max-width:430px; margin:auto; padding:10px; background:#ffffff; display:flex; gap:8px; z-index:9; }
    .chat-input input { flex:1; margin-bottom:0; }
    #messages { margin-bottom:90px; }
    .sender { font-weight:bold; color:#f97316; cursor:pointer; }
    .row { display:flex; gap:8px; }

    .home-week-widget {
      background:transparent;
      border:none;
      border-radius:0;
      padding:0;
      margin:26px 0 0;
      box-shadow:none;
      cursor:pointer;
    }

    .home-week-header {
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:14px;
    }

    .home-week-left {
      display:flex;
      align-items:center;
      gap:10px;
    }

    .home-week-icon { color:#2fa99a; font-size:24px; }

    .home-week-title {
      font-size:24px;
      font-weight:900;
      color:#111827;
      letter-spacing:.5px;
      text-transform:uppercase;
    }

    .home-week-range {
      color:#6b7280;
      font-size:16px;
      font-weight:800;
    }

    .home-week-days {
      display:grid;
      grid-template-columns:repeat(7, 1fr);
      gap:7px;
      margin-bottom:18px;
    }

    .home-week-day {
      background:#f0f2f5;
      border-radius:16px;
      padding:10px 0;
      text-align:center;
      color:#111827;
    }

    .home-week-day span {
      display:block;
      font-size:11px;
      font-weight:900;
      margin-bottom:5px;
    }

    .home-week-day strong {
      display:block;
      font-size:22px;
      font-weight:900;
    }

    .home-week-day.active {
      background:#005A9C;
      color:white;
    }

    .today-event-card {
      background:#ffffff;
      border:1px solid #e5e7eb;
      border-radius:20px;
      padding:16px 16px 16px 18px;
      display:flex;
      align-items:flex-start;
      gap:14px;
      box-shadow:0 3px 10px rgba(15,23,42,.07);
    }

    .today-event-bar {
      width:5px;
      min-height:56px;
      border-radius:999px;
      background:#2fa99a;
      flex:none;
    }

    .today-event-content { flex:1; }

    .today-event-title {
      font-size:20px;
      font-weight:900;
      color:#111827;
      margin-bottom:6px;
    }

    .today-event-time {
      font-size:15px;
      font-weight:700;
      color:#6b7280;
      margin-bottom:8px;
    }

    .calendar-status {
      margin-top:12px;
      font-size:12px;
      color:#6b7280;
      text-align:center;
    }

    .calendar-event-list {
      display:flex;
      flex-direction:column;
      gap:10px;
    }
  </style>
</head>

<body>

<div class="app" id="app"></div>

<div class="nav" id="nav">
  <div onclick="showHome()">Home</div>
  <div onclick="showChatList()">Chat</div>
  <div onclick="showCalendar()">Calendar</div>
  <div onclick="showPage('Docs','Docs coming')">Docs</div>
</div>

<script>
  const SUPABASE_URL = "https://livkeknqrjgmumjgwkuh.supabase.co";
  const SUPABASE_KEY = "sb_publishable_uGTC509N0reeUKs-5SviUQ_2VJvhEa1";
  const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let currentUser = null;
  let currentProfile = null;
  let currentConversationId = null;
  let calendarEvents = [];
  let calendarStatus = "Calendar not loaded yet.";

  async function init() {
    const hash = window.location.hash || "";

    if (hash.includes("access_token") || hash.includes("type=recovery")) {
      showResetPassword();
      return;
    }

    const { data } = await db.auth.getUser();
    currentUser = data.user;

    if (currentUser) {
      await loadProfile();
      await loadCalendarEvents();
      showHome();
    } else {
      showLogin();
    }
  }

  async function loadCalendarEvents() {
    calendarStatus = "Loading calendar...";

    try {
      const { data, error } = await db.functions.invoke("get-calendar-events", {
        method: "GET"
      });

      if (error) {
        calendarEvents = [];
        calendarStatus = "Calendar function error: " + error.message;
        return;
      }

      if (data && data.error) {
        calendarEvents = [];
        calendarStatus = "Google Calendar error: " + data.error;
        return;
      }

      calendarEvents = Array.isArray(data?.events) ? data.events : [];
      calendarStatus = calendarEvents.length
        ? "Calendar connected · " + calendarEvents.length + " event(s)"
        : "Calendar connected, but no events returned.";
    } catch (err) {
      calendarEvents = [];
      calendarStatus = "Calendar loading failed: " + err.message;
    }
  }

  function parseEventDate(event) {
    if (!event || !event.start) return null;

    if (event.allDay && event.start.includes("-")) {
      const parts = event.start.split("-");
      return new Date(Number(parts[0]), Number(parts[1]) - 1, Number(parts[2]), 0, 0, 0);
    }

    return new Date(event.start);
  }

  function getTodayEvents() {
    const today = new Date();

    return calendarEvents
      .filter(event => {
        const date = parseEventDate(event);
        if (!date) return false;
        return date.toDateString() === today.toDateString();
      })
      .sort((a, b) => parseEventDate(a) - parseEventDate(b));
  }

  function formatEventDate(event) {
    const date = parseEventDate(event);
    if (!date) return "No time set";

    if (event.allDay) {
      return "All day";
    }

    return date.toLocaleTimeString([], {
      hour: "numeric",
      minute: "2-digit"
    });
  }

  function getWeekDaysHtml() {
    const today = new Date();
    const start = new Date(today);
    start.setDate(today.getDate() - today.getDay());

    let html = "";

    for (let i = 0; i < 7; i++) {
      const day = new Date(start);
      day.setDate(start.getDate() + i);

      const isToday = day.toDateString() === today.toDateString();

      html += `
        <div class="home-week-day ${isToday ? "active" : ""}">
          <span>${day.toLocaleDateString([], { weekday: "short" }).toUpperCase()}</span>
          <strong>${day.getDate()}</strong>
        </div>
      `;
    }

    return html;
  }

  function getWeekRangeText() {
    const today = new Date();
    const start = new Date(today);
    start.setDate(today.getDate() - today.getDay());

    const end = new Date(start);
    end.setDate(start.getDate() + 6);

    return `${start.toLocaleDateString([], { month: "short", day: "numeric" })} – ${end.toLocaleDateString([], { month: "short", day: "numeric" })}`;
  }

  function getTodayEventsHtml() {
    const todayEvents = getTodayEvents();

    if (!todayEvents.length) {
      return `
        <div class="today-event-title">No events today</div>
        <div class="today-event-time">Nothing scheduled for today</div>
      `;
    }

    return todayEvents.map(event => `
      <div>
        <div class="today-event-title">${event.title || "Untitled event"}</div>
        <div class="today-event-time">${formatEventDate(event)}${event.location ? " · " + event.location : ""}</div>
      </div>
    `).join("");
  }

  function requireYwamEmail(email) {
    return email.toLowerCase().endsWith("@ywamla.org");
  }

  function showLogin() {
    document.getElementById("nav").style.display = "none";

    document.getElementById("app").innerHTML = `
      <h1>PULSE</h1>
      <div class="subtitle">YWAM Los Angeles Staff Login</div>

      <div class="card">
        <input id="name" placeholder="Full name">
        <input id="email" placeholder="YWAM LA email">
        <input id="password" type="password" placeholder="Password">
        <div class="row">
          <button onclick="signUp()">Sign Up</button>
          <button class="secondary" onclick="login()">Log In</button>
        </div>
        <div class="small">Use your @ywamla.org email.</div>
        <div class="small" style="margin-top:14px;">
          Forgot password? <span class="link" onclick="showForgotPassword()">Reset it here</span>
        </div>
      </div>
    `;
  }

  function showForgotPassword() {
    document.getElementById("nav").style.display = "none";

    document.getElementById("app").innerHTML = `
      <h1>PULSE</h1>
      <div class="subtitle">Reset your password</div>

      <div class="card">
        <input id="resetEmail" placeholder="YWAM LA email">
        <button onclick="sendPasswordReset()">Send reset link</button>
        <div class="small" style="margin-top:14px;">
          <span class="link" onclick="showLogin()">← Back to login</span>
        </div>
      </div>
    `;
  }

  async function sendPasswordReset() {
    const email = document.getElementById("resetEmail").value.trim().toLowerCase();

    if (!requireYwamEmail(email)) {
      alert("Please use a @ywamla.org email.");
      return;
    }

    const { error } = await db.auth.resetPasswordForEmail(email, {
      redirectTo: "https://pulse-ywamla.vercel.app"
    });

    if (error) {
      alert(error.message);
      return;
    }

    alert("Password reset email sent. Open the newest email link.");
  }

  function showResetPassword() {
    document.getElementById("nav").style.display = "none";

    document.getElementById("app").innerHTML = `
      <h1>PULSE</h1>
      <div class="subtitle">Create a new password</div>

      <div class="card">
        <input id="newPassword" type="password" placeholder="New password">
        <button onclick="updatePassword()">Update Password</button>
      </div>
    `;
  }

  async function updatePassword() {
    const newPassword = document.getElementById("newPassword").value;

    if (!newPassword || newPassword.length < 6) {
      alert("Password must be at least 6 characters.");
      return;
    }

    const { error } = await db.auth.updateUser({
      password: newPassword
    });

    if (error) {
      alert(error.message);
      return;
    }

    alert("Password updated. Please log in.");
    window.location.hash = "";
    await db.auth.signOut();
    showLogin();
  }

  async function signUp() {
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim().toLowerCase();
    const password = document.getElementById("password").value;

    if (!requireYwamEmail(email)) {
      alert("Please use a @ywamla.org email.");
      return;
    }

    if (!name || !password) {
      alert("Enter name and password.");
      return;
    }

    const { data, error } = await db.auth.signUp({
      email,
      password,
      options: {
        data: { full_name: name }
      }
    });

    if (error) {
      alert(error.message);
      return;
    }

    if (data.user) {
      await db.from("profiles").upsert({
        id: data.user.id,
        name,
        email
      });
    }

    alert("Account created. Now log in.");
    showLogin();
  }

  async function login() {
    const email = document.getElementById("email").value.trim().toLowerCase();
    const password = document.getElementById("password").value;

    if (!requireYwamEmail(email)) {
      alert("Please use a @ywamla.org email.");
      return;
    }

    const { data, error } = await db.auth.signInWithPassword({
      email,
      password
    });

    if (error) {
      alert(error.message);
      return;
    }

    currentUser = data.user;
    await loadProfile();
    await loadCalendarEvents();
    showHome();
  }

  async function logout() {
    await db.auth.signOut();
    currentUser = null;
    currentProfile = null;
    calendarEvents = [];
    calendarStatus = "Calendar not loaded yet.";
    showLogin();
  }

  async function loadProfile() {
    const { data } = await db
      .from("profiles")
      .select("*")
      .eq("id", currentUser.id)
      .single();

    currentProfile = data;

    if (!currentProfile) {
      await db.from("profiles").upsert({
        id: currentUser.id,
        name: currentUser.user_metadata?.full_name || currentUser.email,
        email: currentUser.email
      });

      const { data: newProfile } = await db
        .from("profiles")
        .select("*")
        .eq("id", currentUser.id)
        .single();

      currentProfile = newProfile;
    }
  }

  function showHome() {
    if (!currentUser) return showLogin();

    document.getElementById("nav").style.display = "flex";

    document.getElementById("app").innerHTML = `
      <h1>PULSE</h1>
      <div class="subtitle">YWAM Los Angeles</div>

      <div class="small" style="text-align:center; margin-bottom:8px;">
        Signed in as ${currentProfile?.name || currentUser.email}
        · <span onclick="logout()" style="color:#f97316; cursor:pointer;">Log out</span>
      </div>

      <div class="triangle-wrap">
        <img src="triangle.png" class="triangle" alt="YWAM LA Triangle">
        <div onclick="showArea('Campus','Life & Operations')" class="tap-zone campus-zone"></div>
        <div onclick="showArea('Go','Outreach & Missions')" class="tap-zone go-zone"></div>
        <div onclick="showArea('UofN','Training & Schools')" class="tap-zone uofn-zone"></div>
      </div>

      <div class="section-title">Announcements</div>
      <div class="card"><strong>Staff Meeting</strong><div class="small">Friday 10am</div></div>
      <div class="card"><strong>Outreach Team Update</strong><div class="small">Summer Mexico outreach is now full.</div></div>

      <div class="home-week-widget" onclick="showCalendar()">
        <div class="home-week-header">
          <div class="home-week-left">
            <div class="home-week-icon">▦</div>
            <div class="home-week-title">This Week</div>
          </div>
          <div class="home-week-range">${getWeekRangeText()}</div>
        </div>

        <div class="home-week-days">
          ${getWeekDaysHtml()}
        </div>

        <div class="today-event-card">
          <div class="today-event-bar"></div>
          <div class="today-event-content">
            ${getTodayEventsHtml()}
          </div>
        </div>
      </div>
    `;
  }

  function showCalendar() {
    if (!currentUser) return showLogin();

    const eventsHtml = calendarEvents.length
      ? calendarEvents.map(event => `
          <div class="today-event-card">
            <div class="today-event-bar"></div>
            <div class="today-event-content">
              <div class="today-event-title">${event.title || "Untitled event"}</div>
              <div class="today-event-time">${formatEventDate(event)}${event.location ? " · " + event.location : ""}</div>
            </div>
          </div>
        `).join("")
      : `<div class="card">No upcoming calendar events found.<div class="small">${calendarStatus}</div></div>`;

    document.getElementById("app").innerHTML = `
      <span class="back" onclick="showHome()">← Back</span>
      <h1>Calendar</h1>
      <div class="subtitle">Base Master Calendar</div>

      <div class="home-week-widget">
        <div class="home-week-header">
          <div class="home-week-left">
            <div class="home-week-icon">▦</div>
            <div class="home-week-title">This Week</div>
          </div>
          <div class="home-week-range">${getWeekRangeText()}</div>
        </div>

        <div class="home-week-days">
          ${getWeekDaysHtml()}
        </div>
      </div>

      <div class="section-title">Upcoming Events</div>
      <div class="calendar-event-list">
        ${eventsHtml}
      </div>
    `;
  }

  function showArea(title, subtitle) {
    if (!currentUser) return showLogin();

    document.getElementById("app").innerHTML = `
      <span class="back" onclick="showHome()">← Back</span>
      <h1>${title}</h1>
      <div class="subtitle">${subtitle}</div>
      <div class="card"><strong>Leaders</strong><div class="small">Add leaders and team members here.</div></div>
      <div class="card"><strong>Updates</strong><div class="small">Area-specific announcements will show here.</div></div>
      <div class="card" onclick="showChatList()"><strong>Open Chat</strong><div class="small">Go to conversation list.</div></div>
    `;
  }

  function showPage(title, text) {
    if (!currentUser) return showLogin();

    document.getElementById("app").innerHTML = `
      <span class="back" onclick="showHome()">← Back</span>
      <h1>${title}</h1>
      <div class="card">${text}</div>
    `;
  }

  async function showChatList() {
    if (!currentUser) return showLogin();

    document.getElementById("app").innerHTML = `
      <h1>Chats</h1>
      <div class="subtitle">Groups and private messages</div>

      <div class="section-title">Official & Group Chats</div>
      <div id="conversationList"><div class="card">Loading chats...</div></div>

      <div class="section-title">Start Private Chat</div>
      <div class="card">
        <input id="privateEmail" placeholder="person@ywamla.org">
        <button onclick="startPrivateChatByEmail()">Start Chat</button>
      </div>
    `;

    await loadConversationList();
  }

  async function loadConversationList() {
    const box = document.getElementById("conversationList");

    const { data, error } = await db
      .from("conversations")
      .select("*")
      .order("created_at", { ascending: true });

    if (error) {
      box.innerHTML = `<div class="card">Error: ${error.message}</div>`;
      return;
    }

    const myEmail = currentUser.email.toLowerCase();

    const visible = data.filter(c => {
      if (c.type !== "dm") return true;
      return c.name.toLowerCase().includes(myEmail);
    });

    box.innerHTML = visible.map(c => `
      <div class="card" onclick="openConversation('${c.id}', '${escapeText(c.name)}')">
        <strong>${displayConversationName(c.name)}</strong>
        <div class="small">${c.type === "dm" ? "Private conversation" : c.type}</div>
      </div>
    `).join("");
  }

  function displayConversationName(name) {
    if (!currentUser) return name;
    return name.replace(currentUser.email.toLowerCase(), "You");
  }

  async function startPrivateChatByEmail() {
    const otherEmail = document.getElementById("privateEmail").value.trim().toLowerCase();

    if (!requireYwamEmail(otherEmail)) {
      alert("Use a @ywamla.org email.");
      return;
    }

    if (otherEmail === currentUser.email.toLowerCase()) {
      alert("That is your own email.");
      return;
    }

    await startPrivateChat(otherEmail);
  }

  async function startPrivateChat(otherEmail) {
    if (!otherEmail || !otherEmail.includes("@")) return;

    const myEmail = currentUser.email.toLowerCase();
    const cleanOtherEmail = otherEmail.toLowerCase();

    if (cleanOtherEmail === myEmail) return;

    const emails = [myEmail, cleanOtherEmail].sort();
    const dmName = `${emails[0]} ↔ ${emails[1]}`;

    const { data: existing } = await db
      .from("conversations")
      .select("*")
      .eq("name", dmName)
      .eq("type", "dm")
      .limit(1);

    if (existing && existing.length > 0) {
      openConversation(existing[0].id, existing[0].name);
      return;
    }

    const { data, error } = await db
      .from("conversations")
      .insert([{
        name: dmName,
        type: "dm",
        created_by_name: currentProfile?.name || currentUser.email
      }])
      .select()
      .single();

    if (error) {
      alert(error.message);
      return;
    }

    await db.from("conversation_members").insert([
      { conversation_id: data.id, member_email: myEmail, member_name: currentProfile?.name || myEmail },
      { conversation_id: data.id, member_email: cleanOtherEmail, member_name: cleanOtherEmail }
    ]);

    openConversation(data.id, data.name);
  }

  async function openConversation(id, name) {
    if (!currentUser) return showLogin();

    currentConversationId = id;

    document.getElementById("app").innerHTML = `
      <span class="back" onclick="showChatList()">← Chats</span>
      <h1>${displayConversationName(name)}</h1>
      <div id="messages"><div class="card">Loading messages...</div></div>

      <div class="chat-input">
        <input id="messageInput" placeholder="Type message...">
        <button onclick="sendMessage()">Send</button>
      </div>
    `;

    await loadMessages();
  }

  async function loadMessages() {
    const box = document.getElementById("messages");
    if (!box || !currentConversationId) return;

    const { data, error } = await db
      .from("messages")
      .select("*")
      .eq("conversation_id", currentConversationId)
      .order("created_at", { ascending: true });

    if (error) {
      box.innerHTML = `<div class="card">Error: ${error.message}</div>`;
      return;
    }

    if (!data || data.length === 0) {
      box.innerHTML = `<div class="card">No messages yet.</div>`;
      return;
    }

    box.innerHTML = data.map(msg => `
      <div class="card">
        <div class="sender" onclick="startPrivateChat('${msg.sender_email}')">
          ${msg.sender_name || msg.sender_email || "Unknown"}
        </div>
        <div class="small">${msg.content}</div>
      </div>
    `).join("");

    setTimeout(() => window.scrollTo(0, document.body.scrollHeight), 50);
  }

  async function sendMessage() {
    const input = document.getElementById("messageInput");
    const text = input.value.trim();

    if (!text || !currentConversationId) return;

    const { error } = await db.from("messages").insert([{
      content: text,
      sender_name: currentProfile?.name || currentUser.email,
      sender_email: currentUser.email.toLowerCase(),
      conversation_id: currentConversationId
    }]);

    if (error) {
      alert(error.message);
      return;
    }

    input.value = "";
    await loadMessages();
  }

  function escapeText(text) {
    return String(text).replace(/'/g, "\\'");
  }

  db.channel("pulse-live")
    .on("postgres_changes", { event: "*", schema: "public", table: "messages" }, () => {
      loadMessages();
    })
    .on("postgres_changes", { event: "*", schema: "public", table: "conversations" }, () => {
      if (document.getElementById("conversationList")) loadConversationList();
    })
    .subscribe();

  init();
</script>
