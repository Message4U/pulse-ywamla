<!DOCTYPE html>
<html>
<head>
  <title>PULSE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.png">
  <meta name="theme-color" content="#16213e">

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    body { margin:0; font-family:Arial,sans-serif; background:#ffffff; color:#16213e; }
    .app { max-width:430px; margin:auto; padding:18px 18px 100px; }
    h1 { text-align:center; margin:18px 0 4px; font-size:34px; letter-spacing:1px; }
    h2 { text-align:center; }
    .subtitle { text-align:center; color:#777; font-size:13px; margin-bottom:18px; }
    .section-title { font-weight:bold; margin:20px 0 10px; font-size:15px; text-transform:uppercase; letter-spacing:.5px; }
    .card { background:white; border-radius:14px; padding:14px; margin-bottom:10px; box-shadow:0 2px 8px rgba(0,0,0,.07); cursor:pointer; }
    .small { color:#666; font-size:13px; margin-top:4px; }
    .back { margin-bottom:16px; display:inline-block; color:#f97316; font-weight:bold; cursor:pointer; }
    input { width:100%; padding:12px; border-radius:10px; border:1px solid #ccc; box-sizing:border-box; margin-bottom:10px; }
    button { padding:11px 14px; border:none; background:#f97316; color:white; border-radius:10px; font-weight:bold; cursor:pointer; }
    .secondary { background:#16213e; }
    .link { color:#f97316; font-weight:bold; cursor:pointer; }
    .nav { position:fixed; bottom:0; left:0; right:0; background:white; border-top:1px solid #ddd; display:flex; justify-content:space-around; padding:12px 0; font-size:13px; z-index:10; }
    .nav div { cursor:pointer; color:#6b7280; font-weight:bold; text-align:center; }
    .triangle-wrap { position:relative; width:100%; max-width:340px; margin:0 auto 22px; }
    .triangle { width:100%; display:block; border-radius:20px; }
    .tap-zone { position:absolute; display:block; cursor:pointer; }
    .campus-zone { right:0; bottom:18%; width:55%; height:28%; }
    .go-zone { left:0; bottom:8%; width:45%; height:55%; }
    .uofn-zone { top:0; right:16%; width:45%; height:55%; }
    .chat-input { position:fixed; bottom:48px; left:0; right:0; max-width:430px; margin:auto; padding:10px; background:#ffffff; display:flex; gap:8px; z-index:9; }
    .chat-input input { flex:1; margin-bottom:0; }
    #messages { margin-bottom:90px; }
    .sender { font-weight:bold; color:#f97316; cursor:pointer; }
    .row { display:flex; gap:8px; }

    .home-calendar-widget {
      background:#16213e;
      border-radius:24px;
      padding:18px;
      color:white;
      margin:20px 0;
      box-shadow:0 10px 26px rgba(22,33,62,.18);
      cursor:pointer;
    }

    .home-calendar-top {
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:14px;
    }

    .home-calendar-title {
      font-size:13px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:1.4px;
      opacity:.85;
    }

    .home-calendar-link {
      background:rgba(255,255,255,.15);
      color:white;
      border-radius:999px;
      padding:7px 10px;
      font-size:12px;
      font-weight:800;
    }

    .home-days {
      display:grid;
      grid-template-columns:repeat(7, 1fr);
      gap:6px;
      margin-bottom:16px;
    }

    .home-day {
      text-align:center;
      background:rgba(255,255,255,.1);
      border-radius:14px;
      padding:9px 0;
    }

    .home-day span {
      display:block;
      font-size:10px;
      opacity:.75;
      font-weight:800;
      margin-bottom:5px;
    }

    .home-day strong {
      font-size:17px;
    }

    .home-day.active {
      background:#f97316;
    }

    .next-event {
      background:white;
      color:#16213e;
      border-radius:18px;
      padding:14px;
      display:flex;
      gap:12px;
      align-items:center;
    }

    .next-event-time {
      background:#fff1e8;
      color:#f97316;
      border-radius:14px;
      padding:9px 8px;
      font-size:12px;
      font-weight:900;
      min-width:54px;
      text-align:center;
    }

    .next-event-name {
      font-size:17px;
      font-weight:900;
      color:#111827;
    }

    .next-event-meta {
      font-size:13px;
      color:#6b7280;
      margin-top:3px;
    }

    .calendar-hero {
      background:#16213e;
      color:white;
      border-radius:24px;
      padding:22px;
      margin:10px 0 18px;
      box-shadow:0 10px 24px rgba(22,33,62,.22);
    }

    .calendar-hero-top {
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:18px;
    }

    .calendar-label {
      font-size:13px;
      opacity:.8;
      font-weight:bold;
      text-transform:uppercase;
      letter-spacing:1px;
    }

    .calendar-month {
      font-size:28px;
      font-weight:900;
      margin-top:4px;
    }

    .calendar-pill {
      background:rgba(255,255,255,.15);
      padding:8px 12px;
      border-radius:999px;
      font-size:13px;
      font-weight:bold;
    }

    .calendar-week {
      display:grid;
      grid-template-columns:repeat(7, 1fr);
      gap:7px;
    }

    .calendar-day {
      text-align:center;
      background:rgba(255,255,255,.12);
      border-radius:15px;
      padding:10px 0;
    }

    .calendar-day span {
      display:block;
      font-size:11px;
      opacity:.75;
      font-weight:bold;
      margin-bottom:5px;
    }

    .calendar-day strong {
      font-size:19px;
    }

    .calendar-day.active {
      background:#f97316;
      color:white;
    }

    .calendar-section-head {
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin:22px 0 12px;
    }

    .calendar-section-title {
      font-size:15px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:1px;
      color:#16213e;
    }

    .calendar-section-date {
      font-size:13px;
      color:#777;
      font-weight:bold;
    }

    .event-list {
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .calendar-event {
      background:white;
      border:1px solid #eef0f4;
      border-radius:20px;
      padding:16px;
      box-shadow:0 4px 14px rgba(0,0,0,.06);
      display:flex;
      gap:14px;
      align-items:flex-start;
    }

    .event-time-box {
      min-width:62px;
      background:#f4f6f8;
      border-radius:15px;
      padding:10px 8px;
      text-align:center;
      color:#16213e;
      font-weight:900;
      font-size:13px;
    }

    .event-time-box.orange {
      background:#fff1e8;
      color:#f97316;
    }

    .event-time-box.blue {
      background:#eef3ff;
      color:#16213e;
    }

    .event-info {
      flex:1;
    }

    .event-name {
      font-size:17px;
      font-weight:900;
      margin-bottom:5px;
      color:#111827;
    }

    .event-meta {
      font-size:13px;
      color:#6b7280;
      line-height:1.4;
    }

    .event-tag {
      display:inline-block;
      margin-top:9px;
      background:#f7f7f5;
      color:#555;
      border-radius:999px;
      padding:5px 9px;
      font-size:12px;
      font-weight:bold;
    }
  </style>
</head>

<body>

<div class="app" id="app"></div>

<div class="nav" id="nav">
  <div onclick="showHome()">Home</div>
  <div onclick="showChatList()">Chat</div>
  <div onclick="showCalendar()">Calendar</div>
  <div onclick="showPage('Docs','Docs coming')">Docs</div>
</div>

<script>
  const SUPABASE_URL = "https://livkeknqrjgmumjgwkuh.supabase.co";
  const SUPABASE_KEY = "sb_publishable_uGTC509N0reeUKs-5SviUQ_2VJvhEa1";
  const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let currentUser = null;
  let currentProfile = null;
  let currentConversationId = null;

  async function init() {
    const hash = window.location.hash || "";

    if (hash.includes("access_token") || hash.includes("type=recovery")) {
      showResetPassword();
      return;
    }

    const { data } = await db.auth.getUser();
    currentUser = data.user;

    if (currentUser) {
      await loadProfile();
      showHome();
    } else {
      showLogin();
    }
  }

  function requireYwamEmail(email) {
    return email.toLowerCase().endsWith("@ywamla.org");
  }

  function showLogin() {
    document.getElementById("nav").style.display = "none";

    document.getElementById("app").innerHTML = `
      <h1>PULSE</h1>
      <div class="subtitle">YWAM Los Angeles Staff Login</div>

      <div class="card">
        <input id="name" placeholder="Full name">
        <input id="email" placeholder="YWAM LA email">
        <input id="password" type="password" placeholder="Password">
        <div class="row">
          <button onclick="signUp()">Sign Up</button>
          <button class="secondary" onclick="login()">Log In</button>
        </div>
        <div class="small">Use your @ywamla.org email.</div>
        <div class="small" style="margin-top:14px;">
          Forgot password? <span class="link" onclick="showForgotPassword()">Reset it here</span>
        </div>
      </div>
    `;
  }

  function showForgotPassword() {
    document.getElementById("nav").style.display = "none";

    document.getElementById("app").innerHTML = `
      <h1>PULSE</h1>
      <div class="subtitle">Reset your password</div>

      <div class="card">
        <input id="resetEmail" placeholder="YWAM LA email">
        <button onclick="sendPasswordReset()">Send reset link</button>
        <div class="small" style="margin-top:14px;">
          <span class="link" onclick="showLogin()">← Back to login</span>
        </div>
      </div>
    `;
  }

  async function sendPasswordReset() {
    const email = document.getElementById("resetEmail").value.trim().toLowerCase();

    if (!requireYwamEmail(email)) {
      alert("Please use a @ywamla.org email.");
      return;
    }

    const { error } = await db.auth.resetPasswordForEmail(email, {
      redirectTo: "https://pulse-ywamla.vercel.app"
    });

    if (error) {
      alert(error.message);
      return;
    }

    alert("Password reset email sent. Open the newest email link.");
  }

  function showResetPassword() {
    document.getElementById("nav").style.display = "none";

    document.getElementById("app").innerHTML = `
      <h1>PULSE</h1>
      <div class="subtitle">Create a new password</div>

      <div class="card">
        <input id="newPassword" type="password" placeholder="New password">
        <button onclick="updatePassword()">Update Password</button>
      </div>
    `;
  }

  async function updatePassword() {
    const newPassword = document.getElementById("newPassword").value;

    if (!newPassword || newPassword.length < 6) {
      alert("Password must be at least 6 characters.");
      return;
    }

    const { error } = await db.auth.updateUser({
      password: newPassword
    });

    if (error) {
      alert(error.message);
      return;
    }

    alert("Password updated. Please log in.");
    window.location.hash = "";
    await db.auth.signOut();
    showLogin();
  }

  async function signUp() {
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim().toLowerCase();
    const password = document.getElementById("password").value;

    if (!requireYwamEmail(email)) {
      alert("Please use a @ywamla.org email.");
      return;
    }

    if (!name || !password) {
      alert("Enter name and password.");
      return;
    }

    const { data, error } = await db.auth.signUp({
      email,
      password,
      options: {
        data: { full_name: name }
      }
    });

    if (error) {
      alert(error.message);
      return;
    }

    if (data.user) {
      await db.from("profiles").upsert({
        id: data.user.id,
        name,
        email
      });
    }

    alert("Account created. Now log in.");
    showLogin();
  }

  async function login() {
    const email = document.getElementById("email").value.trim().toLowerCase();
    const password = document.getElementById("password").value;

    if (!requireYwamEmail(email)) {
      alert("Please use a @ywamla.org email.");
      return;
    }

    const { data, error } = await db.auth.signInWithPassword({
      email,
      password
    });

    if (error) {
      alert(error.message);
      return;
    }

    currentUser = data.user;
    await loadProfile();
    showHome();
  }

  async function logout() {
    await db.auth.signOut();
    currentUser = null;
    currentProfile = null;
    showLogin();
  }

  async function loadProfile() {
    const { data } = await db
      .from("profiles")
      .select("*")
      .eq("id", currentUser.id)
      .single();

    currentProfile = data;

    if (!currentProfile) {
      await db.from("profiles").upsert({
        id: currentUser.id,
        name: currentUser.user_metadata?.full_name || currentUser.email,
        email: currentUser.email
      });

      const { data: newProfile } = await db
        .from("profiles")
        .select("*")
        .eq("id", currentUser.id)
        .single();

      currentProfile = newProfile;
    }
  }

  function showHome() {
    if (!currentUser) return showLogin();

    document.getElementById("nav").style.display = "flex";

    document.getElementById("app").innerHTML = `
      <h1>PULSE</h1>
      <div class="subtitle">YWAM Los Angeles</div>

      <div class="small" style="text-align:center; margin-bottom:12px;">
        Signed in as ${currentProfile?.name || currentUser.email}
        · <span onclick="logout()" style="color:#f97316; cursor:pointer;">Log out</span>
      </div>

      <div class="triangle-wrap">
        <img src="triangle.png" class="triangle" alt="YWAM LA Triangle">
        <div onclick="showArea('Campus','Life & Operations')" class="tap-zone campus-zone"></div>
        <div onclick="showArea('Go','Outreach & Missions')" class="tap-zone go-zone"></div>
        <div onclick="showArea('UofN','Training & Schools')" class="tap-zone uofn-zone"></div>
      </div>

      <div class="section-title">Announcements</div>
      <div class="card"><strong>Staff Meeting</strong><div class="small">Friday 10am</div></div>
      <div class="card"><strong>Outreach Team Update</strong><div class="small">Summer Mexico outreach is now full.</div></div>

      <div class="home-calendar-widget" onclick="showCalendar()">
        <div class="home-calendar-top">
          <div>
            <div class="home-calendar-title">This Week</div>
            <div style="font-size:22px; font-weight:900; margin-top:3px;">May 2026</div>
          </div>
          <div class="home-calendar-link">Open Calendar</div>
        </div>

        <div class="home-days">
          <div class="home-day"><span>SUN</span><strong>26</strong></div>
          <div class="home-day"><span>MON</span><strong>27</strong></div>
          <div class="home-day"><span>TUE</span><strong>28</strong></div>
          <div class="home-day"><span>WED</span><strong>29</strong></div>
          <div class="home-day"><span>THU</span><strong>30</strong></div>
          <div class="home-day active"><span>FRI</span><strong>1</strong></div>
          <div class="home-day"><span>SAT</span><strong>2</strong></div>
        </div>

        <div class="next-event">
          <div class="next-event-time">6:00<br>AM</div>
          <div>
            <div class="next-event-name">Intercession</div>
            <div class="next-event-meta">Today · Prayer room</div>
          </div>
        </div>
      </div>
    `;
  }

  function showCalendar() {
    if (!currentUser) return showLogin();

    document.getElementById("nav").style.display = "flex";

    document.getElementById("app").innerHTML = `
      <h1>Calendar</h1>
      <div class="subtitle">YWAM LA Weekly Schedule</div>

      <div class="calendar-hero">
        <div class="calendar-hero-top">
          <div>
            <div class="calendar-label">This Week</div>
            <div class="calendar-month">May 2026</div>
          </div>
          <div class="calendar-pill">Today · Fri 1</div>
        </div>

        <div class="calendar-week">
          <div class="calendar-day"><span>SUN</span><strong>26</strong></div>
          <div class="calendar-day"><span>MON</span><strong>27</strong></div>
          <div class="calendar-day"><span>TUE</span><strong>28</strong></div>
          <div class="calendar-day"><span>WED</span><strong>29</strong></div>
          <div class="calendar-day"><span>THU</span><strong>30</strong></div>
          <div class="calendar-day active"><span>FRI</span><strong>1</strong></div>
          <div class="calendar-day"><span>SAT</span><strong>2</strong></div>
        </div>
      </div>

      <div class="calendar-section-head">
        <div class="calendar-section-title">Friday Events</div>
        <div class="calendar-section-date">May 1</div>
      </div>

      <div class="event-list">
        <div class="calendar-event">
          <div class="event-time-box orange">6:00<br>AM</div>
          <div class="event-info">
            <div class="event-name">Intercession</div>
            <div class="event-meta">Prayer room · Open to all staff</div>
            <div class="event-tag">Spiritual Life</div>
          </div>
        </div>

        <div class="calendar-event">
          <div class="event-time-box blue">10:00<br>AM</div>
          <div class="event-info">
            <div class="event-name">Staff Meeting</div>
            <div class="event-meta">Main Hall · Weekly staff gathering</div>
            <div class="event-tag">Campus</div>
          </div>
        </div>

        <div class="calendar-event">
          <div class="event-time-box">2:00<br>PM</div>
          <div class="event-info">
            <div class="event-name">Outreach Prep</div>
            <div class="event-meta">Missions office · Mexico team planning</div>
            <div class="event-tag">Go</div>
          </div>
        </div>
      </div>
    `;
  }

  function showArea(title, subtitle) {
    if (!currentUser) return showLogin();

    document.getElementById("app").innerHTML = `
      <span class="back" onclick="showHome()">← Back</span>
      <h1>${title}</h1>
      <div class="subtitle">${subtitle}</div>
      <div class="card"><strong>Leaders</strong><div class="small">Add leaders and team members here.</div></div>
      <div class="card"><strong>Updates</strong><div class="small">Area-specific announcements will show here.</div></div>
      <div class="card" onclick="showChatList()"><strong>Open Chat</strong><div class="small">Go to conversation list.</div></div>
    `;
  }

  function showPage(title, text) {
    if (!currentUser) return showLogin();

    document.getElementById("app").innerHTML = `
      <span class="back" onclick="showHome()">← Back</span>
      <h1>${title}</h1>
      <div class="card">${text}</div>
    `;
  }

  async function showChatList() {
    if (!currentUser) return showLogin();

    document.getElementById("app").innerHTML = `
      <h1>Chats</h1>
      <div class="subtitle">Groups and private messages</div>

      <div class="section-title">Official & Group Chats</div>
      <div id="conversationList"><div class="card">Loading chats...</div></div>

      <div class="section-title">Start Private Chat</div>
      <div class="card">
        <input id="privateEmail" placeholder="person@ywamla.org">
        <button onclick="startPrivateChatByEmail()">Start Chat</button>
      </div>
    `;

    await loadConversationList();
  }

  async function loadConversationList() {
    const box = document.getElementById("conversationList");

    const { data, error } = await db
      .from("conversations")
      .select("*")
      .order("created_at", { ascending: true });

    if (error) {
      box.innerHTML = `<div class="card">Error: ${error.message}</div>`;
      return;
    }

    const myEmail = currentUser.email.toLowerCase();

    const visible = data.filter(c => {
      if (c.type !== "dm") return true;
      return c.name.toLowerCase().includes(myEmail);
    });

    box.innerHTML = visible.map(c => `
      <div class="card" onclick="openConversation('${c.id}', '${escapeText(c.name)}')">
        <strong>${displayConversationName(c.name)}</strong>
        <div class="small">${c.type === "dm" ? "Private conversation" : c.type}</div>
      </div>
    `).join("");
  }

  function displayConversationName(name) {
    if (!currentUser) return name;
    return name.replace(currentUser.email.toLowerCase(), "You");
  }

  async function startPrivateChatByEmail() {
    const otherEmail = document.getElementById("privateEmail").value.trim().toLowerCase();

    if (!requireYwamEmail(otherEmail)) {
      alert("Use a @ywamla.org email.");
      return;
    }

    if (otherEmail === currentUser.email.toLowerCase()) {
      alert("That is your own email.");
      return;
    }

    await startPrivateChat(otherEmail);
  }

  async function startPrivateChat(otherEmail) {
    if (!otherEmail || !otherEmail.includes("@")) return;

    const myEmail = currentUser.email.toLowerCase();
    const cleanOtherEmail = otherEmail.toLowerCase();

    if (cleanOtherEmail === myEmail) return;

    const emails = [myEmail, cleanOtherEmail].sort();
    const dmName = `${emails[0]} ↔ ${emails[1]}`;

    const { data: existing } = await db
      .from("conversations")
      .select("*")
      .eq("name", dmName)
      .eq("type", "dm")
      .limit(1);

    if (existing && existing.length > 0) {
      openConversation(existing[0].id, existing[0].name);
      return;
    }

    const { data, error } = await db
      .from("conversations")
      .insert([{
        name: dmName,
        type: "dm",
        created_by_name: currentProfile?.name || currentUser.email
      }])
      .select()
      .single();

    if (error) {
      alert(error.message);
      return;
    }

    await db.from("conversation_members").insert([
      { conversation_id: data.id, member_email: myEmail, member_name: currentProfile?.name || myEmail },
      { conversation_id: data.id, member_email: cleanOtherEmail, member_name: cleanOtherEmail }
    ]);

    openConversation(data.id, data.name);
  }

  async function openConversation(id, name) {
    if (!currentUser) return showLogin();

    currentConversationId = id;

    document.getElementById("app").innerHTML = `
      <span class="back" onclick="showChatList()">← Chats</span>
      <h1>${displayConversationName(name)}</h1>
      <div id="messages"><div class="card">Loading messages...</div></div>

      <div class="chat-input">
        <input id="messageInput" placeholder="Type message...">
        <button onclick="sendMessage()">Send</button>
      </div>
    `;

    await loadMessages();
  }

  async function loadMessages() {
    const box = document.getElementById("messages");
    if (!box || !currentConversationId) return;

    const { data, error } = await db
      .from("messages")
      .select("*")
      .eq("conversation_id", currentConversationId)
      .order("created_at", { ascending: true });

    if (error) {
      box.innerHTML = `<div class="card">Error: ${error.message}</div>`;
      return;
    }

    if (!data || data.length === 0) {
      box.innerHTML = `<div class="card">No messages yet.</div>`;
      return;
    }

    box.innerHTML = data.map(msg => `
      <div class="card">
        <div class="sender" onclick="startPrivateChat('${msg.sender_email}')">
          ${msg.sender_name || msg.sender_email || "Unknown"}
        </div>
        <div class="small">${msg.content}</div>
      </div>
    `).join("");

    setTimeout(() => window.scrollTo(0, document.body.scrollHeight), 50);
  }

  async function sendMessage() {
    const input = document.getElementById("messageInput");
    const text = input.value.trim();

    if (!text || !currentConversationId) return;

    const { error } = await db.from("messages").insert([{
      content: text,
      sender_name: currentProfile?.name || currentUser.email,
      sender_email: currentUser.email.toLowerCase(),
      conversation_id: currentConversationId
    }]);

    if (error) {
      alert(error.message);
      return;
    }

    input.value = "";
    await loadMessages();
  }

  function escapeText(text) {
    return String(text).replace(/'/g, "\\'");
  }

  db.channel("pulse-live")
    .on("postgres_changes", { event: "*", schema: "public", table: "messages" }, () => {
      loadMessages();
    })
    .on("postgres_changes", { event: "*", schema: "public", table: "conversations" }, () => {
      if (document.getElementById("conversationList")) loadConversationList();
    })
    .subscribe();

  init();
</script>

</body>
</html>
