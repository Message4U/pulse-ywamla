<!DOCTYPE html>
<html>
<head>
  <title>PULSE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.png">
  <meta name="theme-color" content="#16213e">

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    body { margin:0; font-family:Arial,sans-serif; background:#f7f7f5; color:#16213e; }
    .app { max-width:430px; margin:auto; padding:18px 18px 100px; }
    h1 { text-align:center; margin:18px 0 4px; font-size:34px; letter-spacing:1px; }
    .subtitle { text-align:center; color:#777; font-size:13px; margin-bottom:18px; }
    .triangle-wrap { position:relative; width:100%; max-width:340px; margin:0 auto 22px; }
    .triangle { width:100%; display:block; border-radius:20px; }
    .tap-zone { position:absolute; display:block; cursor:pointer; }
    .campus-zone { right:0; bottom:18%; width:55%; height:28%; }
    .go-zone { left:0; bottom:8%; width:45%; height:55%; }
    .uofn-zone { top:0; right:16%; width:45%; height:55%; }
    .section-title { font-weight:bold; margin:20px 0 10px; font-size:15px; text-transform:uppercase; }
    .card { background:white; border-radius:14px; padding:14px; margin-bottom:10px; box-shadow:0 2px 8px rgba(0,0,0,.07); }
    .small { color:#666; font-size:13px; margin-top:4px; }
    .back { margin-bottom:16px; display:inline-block; color:#f97316; font-weight:bold; cursor:pointer; }
    .nav { position:fixed; bottom:0; left:0; right:0; background:white; border-top:1px solid #ddd; display:flex; justify-content:space-around; padding:12px 0; font-size:13px; z-index:10; }
    .nav div { cursor:pointer; }
    .chat-input { position:fixed; bottom:48px; left:0; right:0; max-width:430px; margin:auto; padding:10px; background:#f7f7f5; display:flex; gap:8px; z-index:9; }
    .chat-input input { flex:1; padding:10px; border-radius:10px; border:1px solid #ccc; }
    .chat-input button { padding:10px 14px; border:none; background:#f97316; color:white; border-radius:10px; }
    .channel-row { display:flex; gap:8px; overflow-x:auto; margin:15px 0; }
    .channel-btn { padding:9px 12px; background:white; border-radius:999px; border:1px solid #ddd; white-space:nowrap; cursor:pointer; }
    .channel-btn.active { background:#16213e; color:white; }
    .name-box { margin-bottom:12px; }
    .name-box input { width:100%; padding:10px; border-radius:10px; border:1px solid #ccc; box-sizing:border-box; }
  </style>
</head>

<body>

<div class="app" id="app"></div>

<div class="nav">
  <div onclick="showHome()">Home</div>
  <div onclick="showChat('general')">Chat</div>
  <div onclick="showPage('Calendar','Weekly calendar coming')">Calendar</div>
  <div onclick="showPage('Docs','Docs coming')">Docs</div>
</div>

<script>
  const SUPABASE_URL = "https://livkeknqrjgmumjgwkuh.supabase.co";
  const SUPABASE_KEY = "sb_publishable_uGTC509N0reeUKs-5SviUQ_2VJvhEa1";
  const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let currentChannel = "general";

  function getName() {
    let name = localStorage.getItem("pulse_name");
    if (!name) {
      name = prompt("Enter your name for chat:");
      if (name) localStorage.setItem("pulse_name", name);
    }
    return name || "Anonymous";
  }

  function saveName() {
    const input = document.getElementById("nameInput");
    localStorage.setItem("pulse_name", input.value.trim() || "Anonymous");
  }

  function showHome() {
    document.getElementById("app").innerHTML = `
      <h1>PULSE</h1>
      <div class="subtitle">YWAM Los Angeles</div>

      <div class="triangle-wrap">
        <img src="triangle.png" class="triangle" alt="YWAM LA Triangle">
        <div onclick="showArea('Campus','Life & Operations','campus')" class="tap-zone campus-zone"></div>
        <div onclick="showArea('Go','Outreach & Missions','go')" class="tap-zone go-zone"></div>
        <div onclick="showArea('UofN','Training & Schools','uofn')" class="tap-zone uofn-zone"></div>
      </div>

      <div class="section-title">Announcements</div>
      <div class="card"><strong>Staff Meeting</strong><div class="small">Friday 10am</div></div>
      <div class="card"><strong>Outreach Team Update</strong><div class="small">Summer Mexico outreach is now full.</div></div>

      <div class="section-title">This Week</div>
      <div class="card"><strong>Intercession</strong><div class="small">Friday · 6:00 AM</div></div>
    `;
  }

  function showArea(title, subtitle, channel) {
    document.getElementById("app").innerHTML = `
      <span class="back" onclick="showHome()">← Back</span>
      <h1>${title}</h1>
      <div class="subtitle">${subtitle}</div>
      <div class="card"><strong>Leaders</strong><div class="small">Add leaders and team members here.</div></div>
      <div class="card"><strong>Updates</strong><div class="small">Area-specific announcements will show here.</div></div>
      <div class="card" onclick="showChat('${channel}')"><strong>Open ${title} Chat</strong><div class="small">Tap to enter this channel.</div></div>
    `;
  }

  function showPage(title, text) {
    document.getElementById("app").innerHTML = `
      <span class="back" onclick="showHome()">← Back</span>
      <h1>${title}</h1>
      <div class="card">${text}</div>
    `;
  }

  async function showChat(channel) {
    currentChannel = channel;
    const savedName = localStorage.getItem("pulse_name") || "";

    document.getElementById("app").innerHTML = `
      <span class="back" onclick="showHome()">← Back</span>
      <h1>Chat</h1>

      <div class="name-box">
        <input id="nameInput" placeholder="Your name" value="${savedName}" oninput="saveName()">
      </div>

      <div class="channel-row">
        <div class="channel-btn ${channel === 'general' ? 'active' : ''}" onclick="showChat('general')">General</div>
        <div class="channel-btn ${channel === 'campus' ? 'active' : ''}" onclick="showChat('campus')">Campus</div>
        <div class="channel-btn ${channel === 'go' ? 'active' : ''}" onclick="showChat('go')">Go</div>
        <div class="channel-btn ${channel === 'uofn' ? 'active' : ''}" onclick="showChat('uofn')">UofN</div>
      </div>

      <div id="messages"><div class="card">Loading messages...</div></div>

      <div class="chat-input">
        <input id="messageInput" placeholder="Type message..." />
        <button onclick="sendMessage()">Send</button>
      </div>
    `;

    await loadMessages();
  }

  async function loadMessages() {
    const box = document.getElementById("messages");
    if (!box) return;

    const { data, error } = await db
      .from("messages")
      .select("*")
      .eq("channel", currentChannel)
      .order("created_at", { ascending: true });

    if (error) {
      box.innerHTML = `<div class="card">Error: ${error.message}</div>`;
      return;
    }

    if (!data || data.length === 0) {
      box.innerHTML = `<div class="card">No messages yet in this channel.</div>`;
      return;
    }

    box.innerHTML = data.map(msg => `
      <div class="card">
        <strong>${msg.sender_name || "Anonymous"}</strong>
        <div class="small">${msg.content}</div>
      </div>
    `).join("");
  }

  async function sendMessage() {
    const input = document.getElementById("messageInput");
    const text = input.value.trim();
    const name = getName();

    if (!text) return;

    const { error } = await db.from("messages").insert([{
      content: text,
      sender_name: name,
      channel: currentChannel
    }]);

    if (error) {
      alert("Error: " + error.message);
      return;
    }

    input.value = "";
    await loadMessages();
  }

  db.channel("pulse-messages")
    .on("postgres_changes", { event: "*", schema: "public", table: "messages" }, () => {
      loadMessages();
    })
    .subscribe();

  showHome();
</script>

</body>
</html>
