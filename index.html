<!DOCTYPE html>
<html>
<head>
  <title>PULSE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.png">
  <meta name="theme-color" content="#16213e">

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="style.css">

  <style>
    .home-logo {
      display: block;
      width: 340px;   /* 👈 CHANGE THIS TO CONTROL SIZE */
      max-width: 92%;
      height: auto;
      margin: 10px auto 6px;
    }

    .home-logo-subtitle {
      text-align: center;
      font-size: 16px;
      color: #6b7280;
      font-weight: 700;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<div class="app" id="app"></div>

<div class="nav" id="nav">
  <div onclick="showHome()">Home</div>
  <div onclick="showChatList()">Chat</div>
  <div onclick="showCalendar()">Calendar</div>
  <div onclick="showPage('Docs','Docs coming')">Docs</div>
</div>

<script>
const SUPABASE_URL = "https://livkeknqrjgmumjgwkuh.supabase.co";
const SUPABASE_KEY = "sb_publishable_uGTC509N0reeUKs-5SviUQ_2VJvhEa1";
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let currentProfile = null;
let calendarEvents = [];

async function init() {
  const { data } = await db.auth.getUser();
  currentUser = data.user;

  if (currentUser) {
    await loadProfile();
    await loadCalendarEvents();
    showHome();
  } else {
    showLogin();
  }
}

async function loadCalendarEvents() {
  try {
    const { data } = await db.functions.invoke("get-calendar-events");
    calendarEvents = Array.isArray(data?.events) ? data.events : [];
  } catch {
    calendarEvents = [];
  }
}

function parseEventDate(event) {
  if (!event || !event.start) return null;
  return new Date(event.start);
}

function formatEventDate(event) {
  const d = parseEventDate(event);
  if (!d) return "No time set";
  if (event.allDay) return "All day";
  return d.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
}

/* ✅ NEXT EVENT LOGIC (FIXED) */
function getTodayEventsHtml() {
  const now = new Date();

  const upcoming = calendarEvents
    .filter(e => {
      const d = parseEventDate(e);
      return d && d > now;
    })
    .sort((a,b) => parseEventDate(a) - parseEventDate(b));

  if (!upcoming.length) {
    return `<div>No upcoming events</div>`;
  }

  const e = upcoming[0];
  const d = parseEventDate(e);

  return `
    <div>
      <div><strong>${e.title || "Untitled"}</strong></div>
      <div>
        ${d.toLocaleDateString([], { weekday:"short", month:"short", day:"numeric" })}
        · ${formatEventDate(e)}
        ${e.location ? " · " + e.location : ""}
      </div>
    </div>
  `;
}

function showHome() {
  document.getElementById("nav").style.display = "flex";

  document.getElementById("app").innerHTML = `
    <img src="ywam_la_new_logo_horizontal.png" class="home-logo">
    <div class="home-logo-subtitle">Pulse Ecosystem</div>

    <div style="text-align:center;">
      ${currentProfile?.name || currentUser.email}
    </div>

    <div style="margin-top:20px;">
      ${getTodayEventsHtml()}
    </div>
  `;
}

function showLogin() {
  document.getElementById("nav").style.display = "none";

  document.getElementById("app").innerHTML = `
    <h1>PULSE</h1>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  `;
}

async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await db.auth.signInWithPassword({ email, password });

  if (error) {
    alert(error.message);
    return;
  }

  currentUser = data.user;
  await loadProfile();
  await loadCalendarEvents();
  showHome();
}

async function loadProfile() {
  const { data } = await db.from("profiles")
    .select("*")
    .eq("id", currentUser.id)
    .single();

  currentProfile = data;
}

function showCalendar() {
  document.getElementById("app").innerHTML = `
    <span onclick="showHome()">← Back</span>
    <h1>Calendar</h1>

    ${calendarEvents.map(e => `
      <div>
        <strong>${e.title}</strong><br>
        ${formatEventDate(e)}
      </div>
    `).join("")}
  `;
}

function showChatList() {
  document.getElementById("app").innerHTML = `<h1>Chat coming</h1>`;
}

function showPage(title,text) {
  document.getElementById("app").innerHTML = `
    <span onclick="showHome()">← Back</span>
    <h1>${title}</h1>
    <div>${text}</div>
  `;
}

init();
</script>

</body>
</html>
